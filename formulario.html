<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Mi Aplicación</title>
    <style>
        /* Paleta de colores */
        :root {
            --dorado: #D4AF37;
            --dorado-oscuro: #B8921B;
            --texto-claro: #444444;
            --blanco: #ffffff;
            --error: #e74c3c;
            --gris-claro: #ecf0f1;
            --gris-oscuro: #bdc3c7;
        }

        /* Estilos generales */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Contenedor del formulario */
        .container-formulario {
            width: 100%;
            max-width: 450px;
        }

        .form-wrapper {
            background-color: var(--blanco);
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Header del formulario */
        .form-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .titulo-form {
            color: var(--dorado);
            font-size: 2em;
            margin-bottom: 10px;
        }

        .subtitulo-form {
            color: var(--gris-oscuro);
            font-size: 0.95em;
        }

        /* Grupos de formulario */
        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        .label-form {
            color: var(--texto-claro);
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95em;
        }

        /* Inputs */
        .input-form {
            padding: 12px 15px;
            border: 2px solid var(--gris-claro);
            border-radius: 8px;
            font-size: 1em;
            color: var(--texto-claro);
            transition: all 0.3s ease;
            font-family: 'Arial', sans-serif;
        }

        .input-form:focus {
            outline: none;
            border-color: var(--dorado);
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.3);
            background-color: rgba(212, 175, 55, 0.05);
        }

        .input-form::placeholder {
            color: var(--gris-oscuro);
        }

        select.input-form {
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23bdc3c7' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 20px;
            padding-right: 35px;
        }

        /* Checkbox */
        .checkbox {
            flex-direction: row;
            align-items: center;
        }

        .checkbox input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            margin-right: 10px;
            accent-color: var(--dorado);
        }

        .label-checkbox {
            font-weight: normal;
            font-size: 0.9em;
            cursor: pointer;
            margin: 0;
        }

        /* Mensajes de error */
        .error-message {
            color: var(--error);
            font-size: 0.85em;
            margin-top: 5px;
            min-height: 18px;
        }

        /* Botones */
        .form-buttons {
            display: flex;
            gap: 12px;
            margin-top: 25px;
            margin-bottom: 20px;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background-color: var(--dorado);
            color: var(--blanco);
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }

        .btn-primary:hover {
            background-color: var(--dorado-oscuro);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.4);
            transform: translateY(-2px);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background-color: var(--gris-claro);
            color: var(--texto-claro);
            border: 2px solid var(--gris-oscuro);
        }

        .btn-secondary:hover {
            background-color: var(--gris-oscuro);
            color: var(--blanco);
        }

        /* Footer del formulario */
        .form-footer {
            text-align: center;
            border-top: 1px solid var(--gris-claro);
            padding-top: 15px;
        }

        .form-footer p {
            color: var(--texto-claro);
            font-size: 0.95em;
            margin: 0;
        }

        .link-login {
            color: var(--dorado);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .link-login:hover {
            color: var(--dorado-oscuro);
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .form-wrapper {
                padding: 25px 20px;
            }

            .titulo-form {
                font-size: 1.7em;
            }

            .form-buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container-formulario">
        <div class="form-wrapper">
            <div class="form-header">
                <h1 class="titulo-form">Información Personal</h1>
                <p class="subtitulo-form">Completa tu perfil</p>
            </div>

            <form class="formulario" method="POST" action="#" novalidate>
                
                <!-- Nombre Completo -->
                <div class="form-group">
                    <label for="nombre" class="label-form">Nombre Completo</label>
                    <input type="text" id="nombre" name="nombre" class="input-form" placeholder="Tu nombre completo" required>
                    <span class="error-message" id="error-nombre"></span>
                </div>

                <!-- Cédula -->
                <div class="form-group">
                    <label for="cedula" class="label-form">Cédula de Identidad</label>
                    <input type="text" id="cedula" name="cedula" class="input-form" placeholder="Ej: 1019991459" required>
                    <span class="error-message" id="error-cedula"></span>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label for="email" class="label-form">Correo Electrónico</label>
                    <input type="email" id="email" name="email" class="input-form" placeholder="tu@email.com" required>
                    <span class="error-message" id="error-email"></span>
                </div>

                <!-- Teléfono -->
                <div class="form-group">
                    <label for="telefono" class="label-form">Teléfono</label>
                    <input type="tel" id="telefono" name="telefono" class="input-form" placeholder="3133300586" required>
                    <span class="error-message" id="error-telefono"></span>
                </div>

                <!-- Dirección -->
                <div class="form-group">
                    <label for="direccion" class="label-form">Dirección</label>
                    <input type="text" id="direccion" name="direccion" class="input-form" placeholder="Calle y número" required>
                    <span class="error-message" id="error-direccion"></span>
                </div>

                <!-- Ciudad -->
                <div class="form-group">
                    <label for="ciudad" class="label-form">Ciudad</label>
                    <input type="text" id="ciudad" name="ciudad" class="input-form" placeholder="Tu ciudad" required>
                    <span class="error-message" id="error-ciudad"></span>
                </div>

                <!-- Fecha de Nacimiento -->
                <div class="form-group">
                    <label for="fecha" class="label-form">Fecha de Nacimiento</label>
                    <input type="date" id="fecha" name="fecha" class="input-form" required>
                    <span class="error-message" id="error-fecha"></span>
                </div>

                <!-- Género -->
                <div class="form-group">
                    <label for="genero" class="label-form">Género</label>
                    <select id="genero" name="genero" class="input-form" required>
                        <option value="">Selecciona una opción</option>
                        <option value="masculino">Masculino</option>
                        <option value="femenino">Femenino</option>
                        <option value="otro">Otro</option>
                    </select>
                    <span class="error-message" id="error-genero"></span>
                </div>

                <!-- Checkbox Términos -->
                <div class="form-group checkbox">
                    <input type="checkbox" id="terminos" name="terminos" required>
                    <label for="terminos" class="label-checkbox">Confirmo que la información es correcta</label>
                    <span class="error-message" id="error-terminos"></span>
                </div>

                <!-- Botones -->
                <div class="form-buttons">
                    <button type="submit" class="btn btn-primary">Enviar Información</button>
                    <button type="reset" class="btn btn-secondary">Limpiar</button>
                </div>

                <!-- Enlace a Login -->
                <div class="form-footer">
                    <p>¿Necesitas ayuda? <a href="#" class="link-login">Contactanos aquí</a></p>
                </div>

            </form>
        </div>
    </div>

    <script>
        document.querySelector('.formulario').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const nombre = document.getElementById('nombre').value.trim();
            const cedula = document.getElementById('cedula').value.trim();
            const email = document.getElementById('email').value.trim();
            const telefono = document.getElementById('telefono').value.trim();
            const direccion = document.getElementById('direccion').value.trim();
            const ciudad = document.getElementById('ciudad').value.trim();
            const fecha = document.getElementById('fecha').value;
            const genero = document.getElementById('genero').value;
            const terminos = document.getElementById('terminos').checked;
            
            let valido = true;

            document.querySelectorAll('.error-message').forEach(error => error.textContent = '');

            if (nombre.length < 3) {
                document.getElementById('error-nombre').textContent = 'El nombre debe tener al menos 3 caracteres';
                valido = false;
            }

            if (cedula.length < 8) {
                document.getElementById('error-cedula').textContent = 'Ingresa una cédula válida';
                valido = false;
            }

            if (!email.includes('@')) {
                document.getElementById('error-email').textContent = 'Ingresa un correo válido';
                valido = false;
            }

            if (telefono.length < 10) {
                document.getElementById('error-telefono').textContent = 'Ingresa un teléfono válido';
                valido = false;
            }

            if (direccion.length < 5) {
                document.getElementById('error-direccion').textContent = 'Ingresa una dirección válida';
                valido = false;
            }

            if (ciudad.length < 3) {
                document.getElementById('error-ciudad').textContent = 'Ingresa una ciudad válida';
                valido = false;
            }

            if (!fecha) {
                document.getElementById('error-fecha').textContent = 'Selecciona tu fecha de nacimiento';
                valido = false;
            }

            if (!genero) {
                document.getElementById('error-genero').textContent = 'Selecciona un género';
                valido = false;
            }

            if (!terminos) {
                document.getElementById('error-terminos').textContent = 'Debes confirmar que la información es correcta';
                valido = false;
            }

            if (valido) {
                alert('¡Información registrada exitosamente!');
                this.reset();
            }
        });
    </script>
</body>
</html>
